<!DOCTYPE html>
<html>

<head>
  <title>Patient Registration</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <nav>
    <div class="logo" style="text-align: center;">🩸 Blood Lab</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="register.html">Register</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
    </ul>
  </nav>
  <div class="register-box">

    <h1 style="text-align: center; padding: 10px;">Patient Registration</h1>

    <form id="patientForm">

      <input type="text" id="name" placeholder="Patient Name" required>

      <input type="number" id="age" placeholder="Age" required>

      <select id="gender" required>
        <option value="">Select Gender</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>

      <input type="text" id="bloodGroup" placeholder="Blood Group" required>

      <input type="tel" id="phone" placeholder="Phone Number" required>

      <input type="email" id="email" placeholder="Email" required>

      <button type="submit">Register</button>

    </form>

    <p id="message"></p>

  </div>

  <script>
    document.getElementById("patientForm").addEventListener("submit", async (e) => {

      e.preventDefault();

      const patientData = {
        name: document.getElementById("name").value,
        age: document.getElementById("age").value,
        gender: document.getElementById("gender").value,
        bloodGroup: document.getElementById("bloodGroup").value,
        phone: document.getElementById("phone").value,
        email: document.getElementById("email").value
      };

      try {
        const response = await fetch("http://localhost:5000/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(patientData)
        });

        const result = await response.json();

        document.getElementById("message").innerHTML = result.message;

        document.getElementById("patientForm").reset();

      } catch (error) {
        document.getElementById("message").innerHTML =
          "Registration Failed!";
      }
    });

    document.getElementById("patientForm")
      .addEventListener("submit", function (e) {

        e.preventDefault();

        const patient = {
          id: Date.now(),
          name: document.getElementById("name").value,
          age: document.getElementById("age").value,
          gender: document.getElementById("gender").value,
          bloodGroup: document.getElementById("bloodGroup").value,
          phone: document.getElementById("phone").value,
          email: document.getElementById("email").value
        };

        let patients =
          JSON.parse(localStorage.getItem("patients")) || [];

        patients.push(patient);

        localStorage.setItem(
          "patients",
          JSON.stringify(patients)
        );

        alert("Patient Saved Successfully");

        document.getElementById("patientForm").reset();

      });


  </script>

</body>

</html>
